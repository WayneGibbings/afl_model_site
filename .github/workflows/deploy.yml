name: Build and Deploy

on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Firebase service account
        run: |
          SA_PATH="$RUNNER_TEMP/firebase-sa.json"
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$SA_PATH"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$SA_PATH" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Install Functions dependencies
        run: npm ci --prefix functions

      - name: Fetch data from Databricks
        run: npx tsx scripts/fetch-data.ts
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}

      - name: Build static export
        run: npm run build

      - name: Build Functions
        run: npm run build --prefix functions

      - name: Sync Function secrets
        run: |
          printf '%s' "$DATABRICKS_HOST" | npx firebase-tools functions:secrets:set DATABRICKS_HOST --project "$FIREBASE_PROJECT_ID" --data-file=- --force
          printf '%s' "$DATABRICKS_TOKEN" | npx firebase-tools functions:secrets:set DATABRICKS_TOKEN --project "$FIREBASE_PROJECT_ID" --data-file=- --force
          printf '%s' "$DATABRICKS_HTTP_PATH" | npx firebase-tools functions:secrets:set DATABRICKS_HTTP_PATH --project "$FIREBASE_PROJECT_ID" --data-file=- --force
          printf '%s' "$GENIE_SPACE_ID" | npx firebase-tools functions:secrets:set GENIE_SPACE_ID --project "$FIREBASE_PROJECT_ID" --data-file=- --force
          printf '%s' "$SITE_REFRESH_TOKEN" | npx firebase-tools functions:secrets:set SITE_REFRESH_TOKEN --project "$FIREBASE_PROJECT_ID" --data-file=- --force
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
          GENIE_SPACE_ID: ${{ secrets.GENIE_SPACE_ID }}
          SITE_REFRESH_TOKEN: ${{ secrets.SITE_REFRESH_TOKEN }}

      - name: Deploy Hosting and Functions
        run: npx firebase-tools deploy --only hosting,functions --project "$FIREBASE_PROJECT_ID" --non-interactive
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Configure Functions artifact cleanup policy
        run: npx firebase-tools functions:artifacts:setpolicy --location "$FIREBASE_FUNCTIONS_REGION" --days 30 --force --project "$FIREBASE_PROJECT_ID"
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_FUNCTIONS_REGION: ${{ vars.FIREBASE_FUNCTIONS_REGION || 'australia-southeast1' }}

      - name: Refresh live site data cache
        run: |
          curl -fsSL -X POST \
            -H "x-site-refresh-token: $SITE_REFRESH_TOKEN" \
            "https://${FIREBASE_PROJECT_ID}.web.app/api/site-data/refresh"
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          SITE_REFRESH_TOKEN: ${{ secrets.SITE_REFRESH_TOKEN }}
